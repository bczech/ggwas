url: https://bczech.github.io/ggwas/

template:
  bootstrap: 5
  bootswatch: cosmo
  bslib:
    primary: "#1A5276"
    border-radius: 0.5rem

home:
  title: "ggwas — Modern GWAS Visualizations"
  description: >
    Comprehensive ggplot2-based toolkit for visualizing GWAS results.
    Manhattan, QQ, Miami, PheWAS, fine-mapping, genetic correlations, and more.
  links:
    - text: Report a bug
      href: https://github.com/bczech/ggwas/issues
    - text: Zenodo DOI
      href: https://doi.org/10.5281/zenodo.20815110

navbar:
  structure:
    left: [intro, reference, articles, news]
    right: [search, github]
  components:
    github:
      icon: fa-github
      href: https://github.com/bczech/ggwas

footer:
  structure:
    left: developed_by
    right: built_with

authors:
  Bartosz Czech:
    href: https://github.com/bczech

reference:
  - title: "Core plots"
    desc: "Standard GWAS visualizations"
    contents:
      - manhattan_plot
      - qq_plot
      - miami_plot
      - locus_plot
      - volcano_plot
      - pvalue_heatmap
      - circular_manhattan
      - gwas_summary

  - title: "Advanced plots"
    desc: "Multi-trait, enrichment, and post-GWAS visualizations"
    contents:
      - enrichment_manhattan
      - multitrait_manhattan
      - phewas_plot
      - coloc_plot
      - finemapping_plot
      - genetic_correlation
      - architecture_plot

  - title: "Annotation and analysis"
    desc: "Gene annotation, region highlights, top hits"
    contents:
      - manhattan_genes
      - annotate_genes
      - highlight_regions
      - top_hits

  - title: "Data I/O"
    desc: "Reading GWAS summary statistics"
    contents:
      - read_gwas_table
      - read_plink_assoc
      - read_plink_linear
      - read_plink_logistic
      - read_regenie
      - read_gcta_mlma
      - read_gemma
      - as_gwas_data
      - validate_gwas_data

  - title: "Themes and palettes"
    desc: "Publication-ready styling"
    contents:
      - theme_gwas
      - starts_with("theme_")
      - gwas_palette
      - gwas_palettes
      - gwas_preset
      - starts_with("scale_color")
      - starts_with("scale_fill")

  - title: "Data utilities"
    desc: "Filtering, merging, and extracting GWAS data"
    contents:
      - filter_region
      - maf_filter
      - merge_gwas
      - get_loci
      - calc_lambda
      - example_gwas
